<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reaktionsspiel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root{--accent:#7b46d6;--muted:#c9bfe6}
      html,body{height:100%;margin:0;color:#efeaff}
      body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 600px at 10% 12%, rgba(139,88,224,0.22), transparent 15%), radial-gradient(900px 420px at 88% 88%, rgba(118,74,199,0.18), transparent 18%), linear-gradient(135deg,#3a0b46 0%, #240028 45%, #0b0410 100%)}
      .wrap{max-width:860px;margin:40px auto;padding:18px}
      .brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}
      .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a36bff);box-shadow:0 10px 30px rgba(123,70,214,0.18);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
      h1{font-size:1.6rem;margin:0}
      .subtitle{color:var(--muted);font-size:0.95rem}

      /* Glass card with stronger contrast */
      .card{background:rgba(16, 12, 24, 0.63);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:0;border-radius:14px;overflow:hidden;box-shadow:0 12px 30px rgba(6,3,12,0.6)}
      .card-body{padding:16px 18px}

      ol.score{list-style:none;margin:0;padding:0}
      li.score-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
      li.score-item:last-child{border-bottom:0}
      .name{color:#ffffff;font-weight:600}
      .pts{background:linear-gradient(90deg,#ffffff,#caa1ff);padding:6px 12px;border-radius:999px;color:#120018;font-weight:800;font-size:0.95rem;box-shadow:0 4px 12px rgba(123,70,214,0.12)}
      .empty{padding:18px;text-align:center;color:#ddd}
      .toolbar{display:flex;justify-content:flex-end;padding:8px 12px;background:linear-gradient(180deg,rgba(123,70,214,0.03),transparent)}
      .btn-outline-light{color:#efeaff;border-color:rgba(255,255,255,0.06)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <div class="logo" role="img" aria-label="Stoppuhr">
          <svg width="28" height="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g stroke="none" fill="none" fill-rule="evenodd">
              <circle cx="12" cy="13" r="6" stroke="#FFFFFF" stroke-width="1.4" fill="rgba(255,255,255,0.04)"/>
              <path d="M12 10.2v3.1l2.4 1.4" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.5 4.2l1-1.6" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="10.5" y="2" width="3" height="1.2" rx="0.3" fill="#FFFFFF" opacity="0.95"/>
            </g>
          </svg>
        </div>
        <div>
          <h1>Reaktionsspiel</h1>
          <div class="subtitle">Bestenliste — Top Spieler</div>
        </div>
      </div>

      <div class="card" role="region" aria-label="Bestenliste">
        <div class="toolbar">
          <button id="refreshBtn" class="btn btn-sm btn-outline-light me-2">Aktualisieren</button>
        </div>
        <div class="card-body">
          <ol id="leaderboard" class="score" aria-live="polite">
            <li class="empty">Lade Bestenliste…</li>
          </ol>
        </div>
      </div>
    </div>

    <script>
      async function loadScores(){
        const ol = document.getElementById('leaderboard');
        ol.innerHTML = '<li class="empty">Lade Bestenliste…</li>';
        try{
          const res = await fetch('/scores');
          if(!res.ok) throw new Error('Fetch error');
          const arr = await res.json();
          ol.innerHTML = '';
          if(!Array.isArray(arr) || arr.length===0){
            ol.innerHTML = '<li class="empty">Keine Einträge</li>';
            return;
          }
          arr.forEach(item => {
            const li = document.createElement('li');
            li.className = 'score-item';
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = item.name || '—';
            const score = document.createElement('div');
            score.className = 'pts';
            score.textContent = item.score || 0;
            li.appendChild(name);
            li.appendChild(score);
            ol.appendChild(li);
          });
        }catch(e){
          ol.innerHTML = '<li class="empty">Fehler beim Laden</li>';
          console.error(e);
        }
      }
      document.getElementById('refreshBtn').addEventListener('click', loadScores);
      // Auto-refresh every 30s
      window.addEventListener('load', ()=>{ loadScores(); setInterval(loadScores, 30000); });
    </script>
  </body>
</html>
