; PlatformIO Project Configuration File - ReactionGame ESP32

[platformio]
default_envs = reaction_game

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota_512k_spiffs.csv
upload_protocol = esptool
lib_deps =
	mathieucarbou/ESPAsyncWebServer@^3.6.0
	mathieucarbou/AsyncTCP@^3.3.2
	bblanchon/ArduinoJson@^7.3.1

[env:reaction_game]
; Single environment for the reaction game
build_flags =
	-D DEVICE_LABEL='"ReactionGame"'

[env:ota]
; OTA environment for WiFi uploads (use after first serial upload)
; Usage: pio run -e ota -t upload --upload-port=ReactionGame.local
extends = reaction_game
upload_protocol = espota
upload_port = ReactionGame.local
